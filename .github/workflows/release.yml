name: release-go-bin-on-tag

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-go-bin:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache: true

      - name: Set up Bun
        # GoReleaser invokes `go build` directly (bypassing the Makefile),
        # so the //go:embed all:webui/dist directive needs `make ui` to
        # run explicitly first — handled via .goreleaser.yml's before
        # hooks but bun must be on PATH.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v1"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
